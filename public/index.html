<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Dashboard - Badminton 6 Teams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: all 0.3s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        .top-2 { background-color: #ecfdf5; border-left: 4px solid #10b981; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900 pb-20">

    <!-- Header -->
    <header class="gradient-bg text-white py-8 px-4 mb-8 shadow-lg">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold italic tracking-tight flex items-center gap-2">
                    🏸 GIẢI CẦU LÔNG ĐỒNG ĐỘI
                </h1>
                <p class="opacity-80 mt-1">Hệ thống lưu trữ Firebase Realtime Database</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-white/20 p-3 rounded-xl backdrop-blur-md text-center">
                    <div class="text-[10px] uppercase font-bold opacity-70">Trạng thái</div>
                    <div id="sync-status" class="text-sm font-bold text-yellow-300">Đang chờ...</div>
                </div>
                <div class="bg-white/20 p-3 rounded-xl backdrop-blur-md text-center">
                    <div class="text-[10px] uppercase font-bold opacity-70">Project</div>
                    <div id="project-id" class="text-sm font-bold text-yellow-200">---</div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 space-y-8">
        <!-- Dashboard Stats & Ranking -->
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Ranking Table -->
            <div class="lg:col-span-2 card p-6 overflow-hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2">🏆 Bảng Xếp Hạng</h2>
                    <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded font-bold uppercase">Tự động cập nhật</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b text-sm text-gray-500">
                                <th class="pb-3 font-semibold">Hạng</th>
                                <th class="pb-3 font-semibold">Đội</th>
                                <th class="pb-3 font-semibold text-center">Trận</th>
                                <th class="pb-3 font-semibold text-center text-green-600">T</th>
                                <th class="pb-3 font-semibold text-center text-red-600">B</th>
                                <th class="pb-3 font-semibold text-center text-blue-600">Điểm</th>
                                <th class="pb-3 font-semibold text-center">HS</th>
                            </tr>
                        </thead>
                        <tbody id="ranking-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- Play-off View -->
            <div class="card p-6 bg-blue-50 border border-blue-100">
                <h2 class="text-xl font-bold mb-6 text-blue-800">Cây Thắng Cuộc</h2>
                <div class="space-y-6">
                    <div class="space-y-3">
                        <p class="text-xs font-bold text-blue-400 uppercase">Trận Tranh Hạng (Play-off)</p>
                        <div class="p-3 bg-white rounded-lg border border-blue-200 shadow-sm flex justify-between items-center">
                            <span class="text-sm font-medium pr-2" id="sf1-teams">Top 1 vs Top 2</span>
                            <div class="flex gap-2 shrink-0">
                                <input type="number" id="sf1_a" class="playoff-input w-10 h-8 border rounded text-center text-sm" placeholder="A">
                                <input type="number" id="sf1_b" class="playoff-input w-10 h-8 border rounded text-center text-sm" placeholder="B">
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <p class="text-xs font-bold text-yellow-600 uppercase">Ngôi Vương</p>
                        <div id="champion-display" class="p-6 bg-white border-2 border-yellow-300 rounded-xl flex flex-col items-center justify-center text-center">
                            <div class="text-4xl mb-2">🏆</div>
                            <div id="final-winner" class="text-lg font-bold text-yellow-800">Chưa xác định</div>
                            <p class="text-[10px] text-gray-400 mt-1 uppercase">Đội Vô Địch</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Round Robin Fixtures -->
        <section>
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h2 class="text-2xl font-bold">📅 Lịch Thi Đấu Vòng Tròn</h2>
                <div class="flex gap-2">
                    <button id="reset-btn" class="px-4 py-2 bg-white text-red-500 border border-red-200 hover:bg-red-50 rounded-lg text-sm font-semibold transition">Reset Dữ Liệu</button>
                    <button onclick="window.print()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-semibold transition shadow-md">In / Xuất PDF</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="fixtures-container"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAnalytics, isSupported } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAxx48aZarG_Ke_6fZjpIZqYn6wKUIsj5I",
          authDomain: "foodorder-f1a3e.firebaseapp.com",
          databaseURL: "https://foodorder-f1a3e-default-rtdb.firebaseio.com",
          projectId: "foodorder-f1a3e",
          storageBucket: "foodorder-f1a3e.firebasestorage.app",
          messagingSenderId: "383579304358",
          appId: "1:383579304358:web:96daef700fe498fe1a5f67",
          measurementId: "G-BGT9ZKEJJ5"
        };

        const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
        const db = getDatabase(app);
        const stateRef = ref(db, "badminton/tournament_state");

        document.getElementById('project-id').innerText = firebaseConfig.projectId;

        isSupported().then((supported) => {
            if (supported) {
                getAnalytics(app);
            }
        }).catch(() => {
            // Analytics can be unavailable in some environments; ignore safely.
        });

        // --- Configuration ---
        const TEAMS = ["Bình & Tuấn", "Bá Quân & Tùng", "Hồng Quân & Đức", "Trọng & Hưng", "Thọ Điệp & Bá Đại", "Bách & Xuân"];
        const SCHEDULE = [
            { round: 1, matches: [[0, 5], [1, 4], [2, 3]] },
            { round: 2, matches: [[0, 4], [5, 3], [1, 2]] },
            { round: 3, matches: [[0, 3], [4, 2], [5, 1]] },
            { round: 4, matches: [[0, 2], [3, 1], [4, 5]] },
            { round: 5, matches: [[0, 1], [2, 5], [3, 4]] }
        ];

        let tournamentData = { scores: {}, playoffs: {} };

        function updateSyncStatus(text, cls) {
            const status = document.getElementById('sync-status');
            status.innerText = text;
            status.className = cls;
        }

        function startRealtimeSync() {
            updateSyncStatus("Đang tải...", "text-sm font-bold text-yellow-300");
            onValue(stateRef, function(snapshot) {
                if (snapshot.exists()) {
                    tournamentData = snapshot.val();
                } else {
                    saveData();
                }
                renderAll();
                updateSyncStatus("Sẵn sàng", "text-sm font-bold text-green-300");
            }, function(error) {
                console.error('Lỗi đồng bộ Firebase:', error);
                updateSyncStatus("Mất kết nối", "text-sm font-bold text-red-400");
            });
        }

        function saveData() {
            if (!auth.currentUser) {
                updateSyncStatus("Chưa đăng nhập", "text-sm font-bold text-red-400");
                return;
            }
            updateSyncStatus("Đang lưu...", "text-sm font-bold text-yellow-300");
            set(stateRef, tournamentData).then(function() {
                updateSyncStatus("Đã đồng bộ", "text-sm font-bold text-green-300");
            }).catch(function(e) {
                console.error('Lỗi lưu dữ liệu:', e);
                updateSyncStatus("Lỗi lưu!", "text-sm font-bold text-red-400");
            });
        }

        function renderAll() {
            if (!tournamentData || typeof tournamentData !== 'object') {
                tournamentData = { scores: {}, playoffs: {} };
            }
            if (!tournamentData.scores) tournamentData.scores = {};
            if (!tournamentData.playoffs) tournamentData.playoffs = {};
            renderFixtures();
            calculateAndRenderRanking();
        }

        function renderFixtures() {
            const container = document.getElementById('fixtures-container');
            container.innerHTML = '';

            SCHEDULE.forEach(function(round) {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'space-y-4';
                roundDiv.innerHTML = '<h3 class="font-bold text-blue-600 flex items-center gap-2">' +
                    '<span class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-sm">' + round.round + '</span>' +
                    'Vòng ' + round.round +
                '</h3>';

                round.matches.forEach(function(m, idx) {
                    const matchId = 'r' + round.round + '-m' + idx;
                    const teamA = TEAMS[m[0]];
                    const teamB = TEAMS[m[1]];
                    const s = tournamentData.scores[matchId] || { a: '', b: '' };

                    const card = document.createElement('div');
                    card.className = 'card p-4 space-y-3';
                    card.innerHTML =
                        '<div class="flex items-center justify-between gap-2">' +
                            '<div class="flex-1 text-sm font-medium">' + teamA + '</div>' +
                            '<input type="number" data-mid="' + matchId + '" data-t="a" value="' + s.a + '" class="score-input w-12 h-10 border rounded-lg text-center font-bold bg-gray-50 focus:ring-2 focus:ring-blue-500" placeholder="-">' +
                        '</div>' +
                        '<div class="flex items-center justify-between gap-2">' +
                            '<div class="flex-1 text-sm font-medium">' + teamB + '</div>' +
                            '<input type="number" data-mid="' + matchId + '" data-t="b" value="' + s.b + '" class="score-input w-12 h-10 border rounded-lg text-center font-bold bg-gray-50 focus:ring-2 focus:ring-blue-500" placeholder="-">' +
                        '</div>';
                    roundDiv.appendChild(card);
                });
                container.appendChild(roundDiv);
            });

            document.querySelectorAll('.score-input').forEach(function(input) {
                input.onchange = function(e) {
                    const mid = e.target.dataset.mid;
                    const t = e.target.dataset.t;
                    const val = e.target.value === '' ? '' : parseInt(e.target.value);
                    if (!tournamentData.scores[mid]) tournamentData.scores[mid] = { a: '', b: '' };
                    tournamentData.scores[mid][t] = val;
                    saveData();
                    calculateAndRenderRanking();
                };
            });
        }

        function calculateAndRenderRanking() {
            var stats = TEAMS.map(function(name, id) {
                return { id: id, name: name, played: 0, won: 0, lost: 0, points: 0, sFor: 0, sAg: 0, diff: 0, h2h: {} };
            });

            Object.keys(tournamentData.scores).forEach(function(matchId) {
                const s = tournamentData.scores[matchId];
                if (s.a !== '' && s.b !== '' && s.a !== null && s.b !== null) {
                    const r = parseInt(matchId.match(/\d+/g)[0]);
                    const m = parseInt(matchId.match(/\d+/g)[1]);
                    const pair = SCHEDULE[r-1].matches[m];
                    const idxA = pair[0], idxB = pair[1];

                    const tA = stats[idxA], tB = stats[idxB];
                    tA.played++; tB.played++;
                    tA.sFor += s.a; tA.sAg += s.b;
                    tB.sFor += s.b; tB.sAg += s.a;

                    if (s.a > s.b) {
                        tA.won++; tA.points++; tB.lost++;
                        tA.h2h[idxB] = 1; tB.h2h[idxA] = -1;
                    } else if (s.b > s.a) {
                        tB.won++; tB.points++; tA.lost++;
                        tB.h2h[idxA] = 1; tA.h2h[idxB] = -1;
                    }
                }
            });

            stats.forEach(function(s) { s.diff = s.sFor - s.sAg; });

            stats.sort(function(a, b) {
                if (b.points !== a.points) return b.points - a.points;
                if (a.h2h[b.id] !== undefined) return b.h2h[a.id] === 1 ? -1 : 1;
                return b.diff - a.diff;
            });

            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = '';
            stats.forEach(function(s, i) {
                const row = document.createElement('tr');
                row.className = 'border-b transition-colors ' + (i < 2 ? 'top-2' : '');
                row.innerHTML =
                    '<td class="py-4 font-bold text-gray-400 pl-2">' + (i + 1) + '</td>' +
                    '<td class="py-4 font-semibold">' + s.name + '</td>' +
                    '<td class="py-4 text-center text-gray-500">' + s.played + '</td>' +
                    '<td class="py-4 text-center font-medium text-green-600">' + s.won + '</td>' +
                    '<td class="py-4 text-center font-medium text-red-600">' + s.lost + '</td>' +
                    '<td class="py-4 text-center font-bold text-blue-600">' + s.points + '</td>' +
                    '<td class="py-4 text-center text-xs font-mono">' + (s.diff > 0 ? '+' : '') + s.diff + '</td>';
                tbody.appendChild(row);
            });

            const top2 = stats.filter(function(s) { return s.played > 0; }).slice(0, 2);
            const sfTeams = document.getElementById('sf1-teams');
            const winnerText = document.getElementById('final-winner');

            if (top2.length < 2) {
                sfTeams.innerText = "Chờ kết quả vòng bảng...";
                winnerText.innerText = "Chưa xác định";
                return;
            }

            sfTeams.innerText = top2[0].name + ' vs ' + top2[1].name;

            const sf_a = tournamentData.playoffs.sf1_a || '';
            const sf_b = tournamentData.playoffs.sf1_b || '';
            document.getElementById('sf1_a').value = sf_a;
            document.getElementById('sf1_b').value = sf_b;

            if (sf_a !== '' && sf_b !== '') {
                winnerText.innerText = sf_a > sf_b ? top2[0].name : (sf_b > sf_a ? top2[1].name : "Hòa");
            } else {
                winnerText.innerText = "Chờ đấu Play-off";
            }
        }

        document.querySelectorAll('.playoff-input').forEach(function(input) {
            input.onchange = function(e) {
                const id = e.target.id;
                const val = e.target.value === '' ? '' : parseInt(e.target.value);
                tournamentData.playoffs[id] = val;
                saveData();
                calculateAndRenderRanking();
            };
        });

        document.getElementById('reset-btn').onclick = function() {
            if (confirm("Xóa toàn bộ dữ liệu giải đấu trên Firebase?")) {
                tournamentData = { scores: {}, playoffs: {} };
                saveData();
                renderAll();
            }
        };

        function initAuthAndSync() {
            updateSyncStatus("Đang đăng nhập...", "text-sm font-bold text-yellow-300");

            onAuthStateChanged(auth, function(user) {
                if (user) {
                    startRealtimeSync();
                }
            });

            signInAnonymously(auth).catch(function(error) {
                console.error('Lỗi đăng nhập ẩn danh:', error);
                updateSyncStatus("Lỗi đăng nhập", "text-sm font-bold text-red-400");
            });
        }

        initAuthAndSync();
    </script>
</body>
</html>
